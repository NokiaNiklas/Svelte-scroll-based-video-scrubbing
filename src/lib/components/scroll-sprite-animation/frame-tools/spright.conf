# spright input definition — single quality tier, 4x4 grid.
#
# Frames are expected in ./frames/ as uniformly sized PNGs (frame-0001.png ...).
# With 960x540 frames and the limits below, spright packs exactly 4 columns x
# 4 rows = 16 frames per sheet. Output sheets go to ./spritesheet/.
#
# If you change the frame size, keep max-width = columns * frameWidth and
# max-height = rows * frameHeight, and update `columns`/`rows` in ScrollSpriteAnimation.

max-width 3840    # 4 * 960
max-height 2160   # 4 * 540
padding 0
trim none
pack rows

output "./spritesheet/spritesheet-{0-}.png"

glob "./frames/*.png"
